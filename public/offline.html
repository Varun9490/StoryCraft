<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoryCraft — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06060A;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 420px;
        }
        .emoji { font-size: 4rem; margin-bottom: 1.5rem; }
        h1 {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 0.75rem;
            font-style: italic;
        }
        p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #C4622D;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌐</div>
        <h1>You appear to be offline</h1>
        <p>
            StoryCraft needs an internet connection to browse artisan crafts
            and discover stories woven in every thread.
        </p>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">Try Again</a>
    </div>
</body>
</html>
